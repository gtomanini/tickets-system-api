services:
  mysql:
    image: mysql:8.0
    container_name: mysql-tickets
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tickets
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_PASSWORD: 1234
      MYSQL_USER: admin
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "admin", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tickets-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin-tickets
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8090:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: 1234
    networks:
      - tickets-network

volumes:
  mysql-data:

networks:
  tickets-network:
