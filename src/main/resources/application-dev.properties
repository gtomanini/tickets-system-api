# ── Dev profile ──────────────────────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=dev  (already set in .env)
# Connects to the local Docker MySQL started by: make db-up

spring.datasource.url=jdbc:mysql://localhost:3306/tickets
spring.datasource.username=admin
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=dev-secret-key-at-least-32-bytes-long-for-hmac
jwt.expiration-hours=3

# DevDataSeeder runs on startup and seeds the DB if empty (see DevDataSeeder.java)
logging.level.com.br.tickets=DEBUG
logging.level.org.springframework.security=WARN
